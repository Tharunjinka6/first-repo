<!DOCTYPE html>
<html>
<head>
    <title>Signup Page</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <p>
        FIRST NAME:
        <input class="FirstName" type="text" placeholder="Enter your First Name">
    </p>

    <p>
        LAST NAME:
        <input class="LastName" type="text" placeholder="Enter your Last Name">
    </p>

    <p>
        ADDRESS:
        <input class="Address" type="text" placeholder="Enter your Address">
    </p>

    <p>
        STATE:
        <select class="State">
            <option value="" selected disabled>Select state</option>
            <option>ANDHRA PRADESH</option>
            <option>TELANGANA</option>
            <option>TAMILNADU</option>
            <option>KERALA</option>
            <option>KARNATAKA</option>
        </select>
    </p>

    <p>
        PASSWORD:
        <input class="Password" type="text" placeholder="Enter your Password">
    </p>

    <p>
        GENDER:
        <input type="radio" name="Gender" value="Male"> Male
        <input type="radio" name="Gender" value="Female"> Female
    </p>

    <p>
        Do you bleat like a sheep?
        <input class="Question-1" type="checkbox"> Yes
    </p>

    <p>
        How many cups of coffee do you drink a day?<br>
        <input type="radio" name="coffee" value="0 to 2 cups"> 0 to 2 cups
        <input type="radio" name="coffee" value="2 to 4 cups"> 2 to 4 cups
    </p>

    <p>
        Do you Own a personal computer?
        <select class="computer">
            <option value="" selected disabled>Select</option>
            <option>Yes</option>
            <option>No</option>
        </select>
    </p>

    <p>
        How long would it take to make a HTML form?<br>
        <input class="Your_view" type="text">
    </p>

    <p>
        Comments:<br>
        <input class="Comments" type="text">
    </p>

    <button class="button-reset">Reset Form</button>
    <button class="button-survey">Send Survey</button>
</body>
</html>
